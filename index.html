    <title>PULK – Raum für Workshops, Seminare & kreative Formate in Halle (Saale)</title>

    <meta name="description" content="PULK ist ein 100 qm großer, wandelbarer Raum in Halle (Saale) für Workshops, Netzwerktreffen, Seminare, Meetings & kreative Formate – konzipiert für Unternehmen, Organisationen und Teams." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://pulk.space/" />

    <meta name="theme-color" content="#9687FF" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png" />

    <!-- Open Graph Basics -->
    <meta property="og:title" content="PULK – Raum für Workshops & kreative Formate in Halle (Saale)" />
    <meta property="og:description" content="100 m² Raum für Ideen, Wandel & Zusammenarbeit. Ideal für Organisationen, Teams & kreative Prozesse." />

    <meta property="og:url" content="https://pulk.space/" />

    <!-- ========================================================= -->
    <!-- JSON-LD #1: LocalBusiness                                 -->
    <!-- ========================================================= -->
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": ["LocalBusiness", "MeetingRoom", "EventVenue"],
  "name": "PULK – Raum für Workshops und Seminare",
  "description": "PULK ist ein mietbarer, wandelbarer Raum in Halle (Saale) für Workshops, Team-Meetings, Klausuren, Netzwerktreffen, kreative Teamformate, Meetings und Seminare.",
  "image": "https://pulk.space/pulk-og-image_2025.jpg",
  "url": "https://pulk.space/",
  "sameAs": [
    "https://www.instagram.com/pulk.space",
    "https://share.google/1aPrxNg6crO4XKHIb"
  ],
  "knowsAbout": [
    "Workshops",
    "Seminars",
    "Team Meetings",
    "Networking Events",
    "Presentations",
    "Cultural Events"
  ],
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "Talstraße 7",
    "addressLocality": "Halle (Saale)",
    "postalCode": "06120",
    "addressCountry": "DE"
  },
  "geo": {
    "@type": "GeoCoordinates",
    "latitude": 51.4958,
    "longitude": 11.9338
  },
  "contactPoint": {
    "@type": "ContactPoint",
    "email": "kontakt@pulk.space",
    "contactType": "customer support",
    "availableLanguage": ["de", "en"]
  },
  "amenityFeature": [
    { "@type": "LocationFeatureSpecification", "name": "Whiteboard", "value": true },
    { "@type": "LocationFeatureSpecification", "name": "Workshopmaterialien", "value": true },
    { "@type": "LocationFeatureSpecification", "name": "50-Zoll Fernseher", "value": true },
    { "@type": "LocationFeatureSpecification", "name": "Teeküche", "value": true },
    { "@type": "LocationFeatureSpecification", "name": "Internet", "value": true }
  ],
  "maximumAttendeeCapacity": 40,
  "priceRange": "€€",
  "offers": [
    {
    "@type": "AggregateOffer",
    "url": "https://pulk.space/preise",
    "priceCurrency": "EUR",
    "lowPrice": 25,
    "highPrice": 350,
    "availability": "https://schema.org/InStock"
    }
  ]
}
</script>

    <!-- ========================================================= -->
    <!-- JSON-LD #2: FAQPage                                       -->
    <!-- ========================================================= -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Was kann man im PULK machen?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Das PULK ist ein flexibel nutzbarer Raum in Halle (Saale) für Workshops, Netzwerktreffen, Team-Meetings, Klausuren, Präsentationen und alle anderen kreativen Formate – ruhig, in privater Atmosphäre, in einem vielseitigen Raum."
          }
        },
        {
          "@type": "Question",
          "name": "Welche Ausstattung hat der PULK?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Zur Ausstattung gehören ein 50-Zoll-Fernseher, Workshopmaterialien, Pinnwände, Whiteboard, Werkbänke, 8 Tische und bis zu 40 Stühle. Teeküche, Internet, Strom und natürlich Toilette."
          }
        },
        {
          "@type": "Question",
          "name": "Gibt es Catering im PULK?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Catering wird nicht direkt von uns als Service angeboten. Die Mieter:innen müssen sich selbstsändig um Catering kümmern. Unsere Empfehlungen sind: Anna Müller (vegan/vegetarisch) und Gunnar Franke (Getränke)."
          }
        },
        {
          "@type": "Question",
          "name": "Wie läuft die Buchung und Bezahlung ab?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Vor der Nutzung wird ein Vertrag geschlossen. Bezahlung vorab per Überweisung. Preise variieren je nach Umfang und Personenzahl und Nutzungsart. Bei Vorlage der Gemeinnützigkeit gibt es 19 % Rabatt."
          }
        }
      ]
    }
    </script>

      .skip-link {
        position: absolute;

        z-index: 1000;
        transition: top 0.3s;
      }
      .skip-link:focus {
        top: 0;
      }
